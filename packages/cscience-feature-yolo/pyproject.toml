[project]
name = "cscience-feature-yolo"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "cscience-feature-api",
]

[tool.uv.sources]
cscience-feature-api = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cscience/features/yolo"]

[project.entry-points."cscience.features"]
yolo = "cscience.features.yolo:register"