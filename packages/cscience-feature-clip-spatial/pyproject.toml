[project]
name = "cscience-feature-clip-spatial"
version = "0.1.0"
description = "CLIP Spatial feature implementation for the CScience feature API."
requires-python = ">=3.13,<3.14"
dependencies = [
    "cscience-feature-api",

    "numpy>=2.0,<3",
    "pillow>=12.3.0,<13",

    "torch>=2.7,<3",
    "torchvision>=0.22,<1",

    "open-clip-torch>=3.3,<4",
    "transformers>=5.13,<6",
    "icontract>=2.7.3",
]

[tool.uv.sources]
cscience-feature-api = { workspace = true }

torch = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

torchvision = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/cscience"]
sources = ["src"]

[tool.hatch.build.targets.sdist]
only-include = [
    "src",
    "resources",
    "pyproject.toml",
    "README.md",
]

[project.entry-points."cscience.features"]
clip_spatial = "cscience.features.clip_spatial:register"