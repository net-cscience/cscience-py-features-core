[project]
name = "cscience-feature-api"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.13.4",
    "pillow>=12.3.0,<13",
]

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/cscience"]
sources = ["src"]