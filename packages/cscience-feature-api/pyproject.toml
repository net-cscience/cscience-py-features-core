[project]
name = "cscience-feature-api"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "numpy>=2.0",
    "pillow>=11.0",
    "torch>=2.0",
]

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/cscience"]
sources = ["src"]