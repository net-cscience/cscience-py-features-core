[project]
name = "cscience-feature-nsfw-image"
version = "0.1.0"
description = "NsfwImage feature implementation for the CScience feature API."
requires-python = ">=3.13,<3.14"
dependencies = [
    "cscience-feature-api",
]

[tool.uv.sources]
cscience-feature-api = { workspace = true }

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/cscience"]
sources = ["src"]

[project.entry-points."cscience.features"]
nsfw_image = "cscience.features.nsfw_image:register"
