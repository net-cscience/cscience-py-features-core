# From cscience-feature-nsfw-image\pyproject.toml
[project]
name = "cscience-feature-nsfw-image"
version = "0.1.0"
description = "NSFW image classification feature implementation for the CScience feature API."
requires-python = ">=3.13,<3.14"
dependencies = [
    "cscience-feature-api",

    "pillow>=12.3.0,<13",
    "torch>=2.13.0,<3",
    "torchvision>=0.28.0,<1",
    "transformers>=5.14.1,<6",
]

[tool.uv.sources]
cscience-feature-api = { workspace = true }

torch = [
    { index = "pytorch-cu130", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

torchvision = [
    { index = "pytorch-cu130", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[build-system]
requires = ["hatchling>=1.31.0,<2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/cscience"]
sources = ["src"]

[project.entry-points."cscience.features"]
nsfw_image = "cscience.features.nsfw_image:register"
