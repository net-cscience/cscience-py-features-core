[project]
name = "project-maintenance"
version = "0.1.0"
description = "Utility commands for maintaining the CScience Python feature workspace."
requires-python = ">=3.13,<3.14"
dependencies = [
    "pillow>=12.0,<13",
]

[project.scripts]
fixtures = "fixtures.cli:main"
exporting = "exporting.cli:main"
create-feature-template = "templating.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/fixtures",
    "src/exporting",
    "src/templating",
]