
[project]
name = "cscience-feature-asr-whisper"
version = "0.1.0"
description = "Whisper ASR feature implementation for the CScience feature API."
requires-python = ">=3.13,<3.14"
dependencies = [
    "cscience-feature-api",

    "numpy>=2.4.6,<2.5",
    "soundfile>=0.14.0,<1",
    "librosa>=0.11.0,<1",

    "torch>=2.13.0,<3",

    "openai-whisper>=20250625,<20260000",
]

[tool.uv.sources]
cscience-feature-api = { workspace = true }

torch = [
    { index = "pytorch-cu130", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[build-system]
requires = ["hatchling>=1.31.0,<2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/cscience"]
sources = ["src"]

[tool.hatch.build.targets.sdist]
only-include = [
    "src",
    "resources",
    "pyproject.toml",
    "README.md",
]

[project.entry-points."cscience.features"]
asr_whisper = "cscience.features.asr_whisper:register"