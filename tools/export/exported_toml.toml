# From packages\cscience-feature-asr-whisper\pyproject.toml
[project]
name = "cscience-feature-asr-whisper"
version = "0.1.0"
description = "Whisper ASR feature implementation for the CScience feature API."
requires-python = ">=3.13,<3.14"
dependencies = [
    "cscience-feature-api",

    "numpy>=2.0,<3",
    "torch>=2.7,<3",
    "openai-whisper>=20250625",
    "soundfile>=0.13,<1",
    "librosa>=0.11,<1",
]

[tool.uv.sources]
cscience-feature-api = { workspace = true }

torch = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/cscience"]
sources = ["src"]

[project.entry-points."cscience.features"]
asr_whisper = "cscience.features.asr_whisper:register"

